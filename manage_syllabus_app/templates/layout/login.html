<div class="container" style="max-width: 500px; margin-top: 100px;">
    {# Hiển thị thông báo lỗi nếu có #}
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}
    <div class="d-flex flex-grow-1 align-items-center justify-content-center py-5 px-3">
        <div class="w-100 rounded-3 shadow-sm p-4 bg-white border" style="max-width: 480px;">
            <div class="mb-4 text-center">
                <h2 class="m-0 mb-2 fw-semibold text-dark" style="font-size: 24px; line-height: 1.3;">
                    Đăng nhập tài khoản
                </h2>
            </div>
            <form method="post">
                <div class="mb-3">
                    <label for="username" class="form-label fw-medium text-dark" style="font-size: 14px;">
                        Tên đăng nhập
                    </label>
                    <input
                            type="text"
                            id="username"
                            class="form-control py-3 px-4"
                            placeholder="abcxyz123"
                            style="font-size: 15px;"
                            name="username"
                    >
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-medium text-dark" style="font-size: 14px;">
                        Mật khẩu
                    </label>
                    <input
                            type="password"
                            id="password"
                            class="form-control py-3 px-4"
                            placeholder="Nhập mật khẩu"
                            style="font-size: 15px;"
                            name="password"
                    >
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 mb-2 fw-semibold shadow-sm"
                        style="font-size: 15px;">
                    Đăng nhập
                </button>
            </form>
        </div>
    </div>
</div>
