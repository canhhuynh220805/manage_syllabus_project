{% extends 'partials/subsections/references/base_th_header.html' %}
{% block content %}
<td>
        <div id="editable-container-director-{{ sub_item.id }}" class="editable-container ">
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body p-2">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label text-dark small fw-bold mb-1">
                                Khoa (Faculty)
                            </label>
                            <input type="text"
                                   class="form-control bg-light"
                                   value="{{ syllabus.faculty.name }}"
                                   readonly>
                        </div>
                        <div class="col-12">
                            <label class="form-label text-dark small fw-bold mb-1">
                                Giảng viên (Lecturer)
                            </label>
                            <input type="text"
                                   class="form-control bg-light"
                                   value="{{ syllabus.lecturer.name }}"
                                   readonly>
                        </div>
                        <div class="col-12">
                            <label class="form-label text-dark small fw-bold mb-1">
                                Email
                            </label>
                            <input type="email"
                                   class="form-control bg-light"
                                   value="{{ syllabus.lecturer.email or 'Chưa có' }}"
                                   readonly>
                        </div>
                        <div class="col-12">
                            <label class="form-label text-dark small fw-bold mb-1">
                                Địa chỉ liên hệ (Contact)
                            </label>
                            <input type="text"
                                   class="form-control bg-light"
                                   value="{{ syllabus.lecturer.room or 'Chưa có' }}"
                                   readonly>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </td>
{% endblock%}
