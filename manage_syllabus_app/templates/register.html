{% extends 'base.html' %}

{% block content %}
<div class="d-flex flex-grow-1 align-items-center justify-content-center py-5 px-3">
    <div class="w-100 rounded-3 shadow-sm p-4 bg-white border" style="max-width: 480px;">
        <div class="mb-4 text-center">
            <div class="d-inline-flex align-items-center justify-content-center rounded mb-3 bg-primary bg-opacity-10 border border-primary border-opacity-25"
                 style="width: 56px; height: 56px;">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 14l9-5-9-5-9 5 9 5z" fill="currentColor" class="text-primary" />
                    <path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" fill="currentColor" class="text-primary opacity-50" />
                </svg>
            </div>
            <h2 class="m-0 mb-2 fw-semibold text-dark" style="font-size: 24px; line-height: 1.3;">
                Đăng ký tài khoản
            </h2>
        </div>
        <form>
            <div class="mb-3">
                <label for="username" class="form-label fw-medium text-dark" style="font-size: 14px;">
                    Tên đăng nhập
                </label>
                <input
                    type="text"
                    id="username"
                    class="form-control py-3 px-4"
                    placeholder="abcxyz123"
                    style="font-size: 15px;"
                >
            </div>
<!--            <div class="mb-3">-->
<!--                <label for="email" class="form-label fw-medium text-dark" style="font-size: 14px;">-->
<!--                    Địa chỉ email-->
<!--                </label>-->
<!--                <input-->
<!--                    type="email"-->
<!--                    id="email"-->
<!--                    class="form-control py-3 px-4"-->
<!--                    placeholder="name@ou.edu.vn"-->
<!--                    style="font-size: 15px;"-->
<!--                >-->
<!--            </div>-->
            <div class="mb-3">
                <label for="password" class="form-label fw-medium text-dark" style="font-size: 14px;">
                    Mật khẩu
                </label>
                <input
                    type="password"
                    id="password"
                    class="form-control py-3 px-4"
                    placeholder="Nhập mật khẩu"
                    style="font-size: 15px;"
                >
            </div>
            <div class="mb-4">
                <label for="confirm-password" class="form-label fw-medium text-dark" style="font-size: 14px;">
                    Xác nhận mật khẩu
                </label>
                <input
                    type="password"
                    id="confirm-password"
                    class="form-control py-3 px-4"
                    placeholder="Nhập lại mật khẩu"
                    style="font-size: 15px;"
                >
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 mb-4 fw-semibold shadow-sm" style="font-size: 15px;">
                Đăng ký
            </button>
        </form>
    </div>
</div>
{% endblock %}
